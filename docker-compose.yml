version: '3.8'

services:
  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage

  redis-queue:
    image: redis:alpine
    container_name: redis-queue
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis_data:/data

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis-queue
      - qdrant-db
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis-queue
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant-db:6333
      - OLLAMA_URL=http://host.docker.internal:11434
    volumes:
      - ./data/uploads:/app/storage/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend-api
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:3000 # Browsers will access backend via localhost
